<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvain VIZZINI — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-standard">
    <!-- Sophisticated Overlays -->
    <div class="noise-overlay"></div>
    <div id="custom-cursor" class="custom-cursor"></div>
    <div id="cursor-dot" class="cursor-dot"></div>

    <!-- Theme Selector Landing Screen -->
    <div id="landing-screen" class="landing-screen">
        <div class="landing-content">
            <h1>Sylvain VIZZINI</h1>
            <p class="landing-subtitle">Scrum Master · Product Manager · Consultant Agile Senior</p>
            <div class="theme-picker">
                <button class="theme-btn active" data-theme="standard">Standard</button>
                <button class="theme-btn disabled" data-theme="dbz">
                    Dragon Ball Z <span class="badge">Coming Soon</span>
                </button>
                <button class="theme-btn disabled" data-theme="naruto">
                    Naruto <span class="badge">Coming Soon</span>
                </button>
                <button class="theme-btn disabled" data-theme="wwe">
                    WWE <span class="badge">Coming Soon</span>
                </button>
                <button class="theme-btn disabled" data-theme="pizzeria">
                    Pizzeria <span class="badge">Coming Soon</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Portfolio (Hidden by default) -->
    <div id="portfolio-container" class="portfolio-container hidden">
        <header class="main-header">
            <div class="container">
                <div class="header-inner">
                    <span class="logo">SV.</span>
                    <div class="header-controls">
                        <button id="theme-switch-btn" class="header-btn" data-i18n="btn_themes">Thèmes</button>
                        <button id="lang-toggle" class="header-btn">FR / EN</button>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- Hero Section -->
            <section id="hero" class="hero-section">
                <div class="container">
                    <div id="hero-content" class="hero-content">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section id="results" class="results-section">
                <div class="container">
                    <h2 class="section-title" data-i18n="results_title">Résultats & Impact</h2>
                    <div id="results-grid" class="results-grid">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>

            <!-- Skills Section -->
            <section id="skills" class="skills-section">
                <div class="container">
                    <h2 class="section-title" data-i18n="skills_title">Compétences</h2>
                    <div id="skills-list" class="skills-list">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>

            <!-- Timeline Section -->
            <section id="timeline" class="timeline-section">
                <div class="container">
                    <h2 class="section-title" data-i18n="timeline_title">Parcours</h2>
                    <div class="role-filters">
                        <button class="filter-btn active" data-i18n="filter_all">Tout</button>
                        <button class="filter-btn disabled">Scrum Master <span class="badge">Soon</span></button>
                        <button class="filter-btn disabled">Product Manager <span class="badge">Soon</span></button>
                        <button class="filter-btn disabled">Delivery Manager <span class="badge">Soon</span></button>
                        <button class="filter-btn disabled">No-Code <span class="badge">Soon</span></button>
                        <button class="filter-btn disabled">Coaching <span class="badge">Soon</span></button>
                    </div>
                    <div id="timeline-container" class="timeline-container">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>

            <!-- Certifications Section -->
            <section id="certifications" class="certs-section">
                <div class="container">
                    <h2 class="section-title" data-i18n="certs_title">Certifications</h2>
                    <div id="certs-grid" class="certs-grid">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>

            <!-- Contact Section -->
            <section id="contact" class="contact-section">
                <div class="container">
                    <div id="contact-content" class="contact-card">
                        <!-- Dynamic Content -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="main-footer">
            <div class="container">
                <p>&copy; 2026 Sylvain VIZZINI. <span data-i18n="footer_rights">Tous droits réservés.</span></p>
                <p class="ai-credit" data-i18n="footer_ai">✨ Co-créé avec l'IA (Gemini & Claude)</p>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
